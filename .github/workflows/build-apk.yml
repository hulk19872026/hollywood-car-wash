name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        default: preview
        options:
          - preview
          - production
  push:
    branches:
      - main
      - claude/build-apk-download-FPALx
    paths:
      - "project/mobile/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    name: eas build (android, ${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: project/mobile
    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Set up EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Ensure project is linked to Expo account
        run: eas init --non-interactive --force
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Trigger EAS Android build
        id: build
        run: |
          set -euo pipefail
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --no-wait \
            --json > build.json
          echo "--- raw eas build --json output ---"
          cat build.json
          echo "--- end ---"

          BUILD_ID=$(node -e "console.log(JSON.parse(require('fs').readFileSync('build.json','utf8'))[0].id||'')")
          OWNER=$(node -e "const b=JSON.parse(require('fs').readFileSync('build.json','utf8'))[0]; console.log(b.project?.ownerAccount?.name || b.account?.name || JSON.parse(require('fs').readFileSync('app.json','utf8')).expo.owner || '')")
          SLUG=$(node -e "const b=JSON.parse(require('fs').readFileSync('build.json','utf8'))[0]; console.log(b.project?.slug || JSON.parse(require('fs').readFileSync('app.json','utf8')).expo.slug || '')")

          BUILD_URL=$(node -e "const b=JSON.parse(require('fs').readFileSync('build.json','utf8'))[0]; console.log(b.buildDetailsPageUrl || b.buildUrl || b.url || '')")
          if [ -z "$BUILD_URL" ] && [ -n "$OWNER" ] && [ -n "$SLUG" ] && [ -n "$BUILD_ID" ]; then
            BUILD_URL="https://expo.dev/accounts/$OWNER/projects/$SLUG/builds/$BUILD_ID"
          fi

          echo "build_id=$BUILD_ID"   >> "$GITHUB_OUTPUT"
          echo "build_url=$BUILD_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved build URL: $BUILD_URL"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Summarize build link
        run: |
          URL="${{ steps.build.outputs.build_url }}"
          ID="${{ steps.build.outputs.build_id }}"
          {
            echo "## Android APK build queued"
            echo ""
            echo "- Profile: \`${{ github.event.inputs.profile || 'preview' }}\`"
            if [ -n "$URL" ]; then
              echo "- Build page: [$URL]($URL)"
            else
              echo "- Build id: \`$ID\` (open https://expo.dev to find it)"
            fi
            echo ""
            echo "When the build finishes (typically 10-25 min), open the build page on a phone, tap **Install**, and accept 'install from unknown sources'. The APK is also downloadable from the same page."
          } >> "$GITHUB_STEP_SUMMARY"
